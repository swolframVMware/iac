# ----------------------------------------------------------------------------------- #
# Test Playbook: Depot Module and Role Testing
# ----------------------------------------------------------------------------------- #
# Description:
#   This playbook demonstrates all features of the depot module and role,
#   including configuring online/offline depots, switching between them,
#   and removing depot configuration.
#
# WARNING: This is a test playbook. Use with caution in production environments.
# ----------------------------------------------------------------------------------- #

- name: Test Depot Module and Role
  hosts: localhost
  gather_facts: false
  vars:
    # Test configuration - replace with actual values
    test_sddc_manager_hostname: "sddc-manager.example.com"
    test_sddc_manager_user: "admin"
    test_sddc_manager_password: "password"

    # Online depot token
    test_download_token: "your-download-token-here"

    # Offline depot configuration
    test_offline_hostname: "depot.example.com"
    test_offline_port: 443
    test_offline_username: "depot_user"
    test_offline_password: "depot_password"
    test_offline_ssl_thumbprint: "AB:CD:EF:12:34:56:78:90:AB:CD:EF:12:34:56:78:90:AB:CD:EF:12"

  tasks:
    # ----------------------------------------------------------------------------------- #
    # Test 1: Get Current Depot Status
    # ----------------------------------------------------------------------------------- #
    - name: Test 1 - Get Current Depot Configuration
      block:
        - name: Get Depot Info
          broadcom.vcf.sddc_manager_depot_info:
            sddc_manager_hostname: "{{ test_sddc_manager_hostname }}"
            sddc_manager_user: "{{ test_sddc_manager_user }}"
            sddc_manager_password: "{{ test_sddc_manager_password }}"
          register: initial_depot_status

        - name: Display Initial Depot Status
          ansible.builtin.debug:
            msg: "Initial Depot Status: {{ initial_depot_status.msg }}"

    # ----------------------------------------------------------------------------------- #
    # Test 2: Configure Online Depot
    # ----------------------------------------------------------------------------------- #
    - name: Test 2 - Configure Online Depot
      block:
        - name: Configure Online Depot
          broadcom.vcf.sddc_manager_depot:
            sddc_manager_hostname: "{{ test_sddc_manager_hostname }}"
            sddc_manager_user: "{{ test_sddc_manager_user }}"
            sddc_manager_password: "{{ test_sddc_manager_password }}"
            state: present
            depot_type: online
            download_token: "{{ test_download_token }}"
          register: online_depot_result

        - name: Display Online Depot Result
          ansible.builtin.debug:
            msg: "{{ online_depot_result.msg }}"

        - name: Verify Online Depot Configuration
          broadcom.vcf.sddc_manager_depot_info:
            sddc_manager_hostname: "{{ test_sddc_manager_hostname }}"
            sddc_manager_user: "{{ test_sddc_manager_user }}"
            sddc_manager_password: "{{ test_sddc_manager_password }}"
          register: after_online_status

        - name: Display Depot Status After Online Configuration
          ansible.builtin.debug:
            msg: "After Online Configuration: {{ after_online_status.msg }}"

    # ----------------------------------------------------------------------------------- #
    # Test 3: Switch to Offline Depot (demonstrates type change logging)
    # ----------------------------------------------------------------------------------- #
    - name: Test 3 - Switch to Offline Depot
      block:
        - name: Configure Offline Depot (switching from online)
          broadcom.vcf.sddc_manager_depot:
            sddc_manager_hostname: "{{ test_sddc_manager_hostname }}"
            sddc_manager_user: "{{ test_sddc_manager_user }}"
            sddc_manager_password: "{{ test_sddc_manager_password }}"
            state: present
            depot_type: offline
            offline_hostname: "{{ test_offline_hostname }}"
            offline_port: "{{ test_offline_port }}"
            offline_username: "{{ test_offline_username }}"
            offline_password: "{{ test_offline_password }}"
            offline_ssl_thumbprint: "{{ test_offline_ssl_thumbprint }}"
          register: offline_depot_result

        - name: Display Offline Depot Result (should show type change)
          ansible.builtin.debug:
            msg: "{{ offline_depot_result.msg }}"

        - name: Verify Offline Depot Configuration
          broadcom.vcf.sddc_manager_depot_info:
            sddc_manager_hostname: "{{ test_sddc_manager_hostname }}"
            sddc_manager_user: "{{ test_sddc_manager_user }}"
            sddc_manager_password: "{{ test_sddc_manager_password }}"
          register: after_offline_status

        - name: Display Depot Status After Offline Configuration
          ansible.builtin.debug:
            msg: "After Offline Configuration: {{ after_offline_status.msg }}"

    # ----------------------------------------------------------------------------------- #
    # Test 4: Idempotency Test (configure same depot again)
    # ----------------------------------------------------------------------------------- #
    - name: Test 4 - Idempotency Test
      block:
        - name: Configure Offline Depot Again (should be no change)
          broadcom.vcf.sddc_manager_depot:
            sddc_manager_hostname: "{{ test_sddc_manager_hostname }}"
            sddc_manager_user: "{{ test_sddc_manager_user }}"
            sddc_manager_password: "{{ test_sddc_manager_password }}"
            state: present
            depot_type: offline
            offline_hostname: "{{ test_offline_hostname }}"
            offline_port: "{{ test_offline_port }}"
            offline_username: "{{ test_offline_username }}"
            offline_password: "{{ test_offline_password }}"
            offline_ssl_thumbprint: "{{ test_offline_ssl_thumbprint }}"
          register: idempotency_result

        - name: Display Idempotency Result
          ansible.builtin.debug:
            msg: "Idempotency Test: {{ idempotency_result.msg }}"

        - name: Assert No Changes Made
          ansible.builtin.assert:
            that:
              - not idempotency_result.changed
            fail_msg: "Idempotency test failed - changes were made when none expected"
            success_msg: "Idempotency test passed - no changes made"

    # ----------------------------------------------------------------------------------- #
    # Test 5: Check Mode Test
    # ----------------------------------------------------------------------------------- #
    - name: Test 5 - Check Mode Test
      block:
        - name: Switch to Online Depot in Check Mode
          broadcom.vcf.sddc_manager_depot:
            sddc_manager_hostname: "{{ test_sddc_manager_hostname }}"
            sddc_manager_user: "{{ test_sddc_manager_user }}"
            sddc_manager_password: "{{ test_sddc_manager_password }}"
            state: present
            depot_type: online
            download_token: "{{ test_download_token }}"
          check_mode: true
          register: check_mode_result

        - name: Display Check Mode Result
          ansible.builtin.debug:
            msg: "Check Mode: {{ check_mode_result.msg }}"

        - name: Verify No Actual Changes Were Made
          broadcom.vcf.sddc_manager_depot_info:
            sddc_manager_hostname: "{{ test_sddc_manager_hostname }}"
            sddc_manager_user: "{{ test_sddc_manager_user }}"
            sddc_manager_password: "{{ test_sddc_manager_password }}"
          register: after_check_mode_status

        - name: Assert Configuration Unchanged
          ansible.builtin.assert:
            that:
              - "'offline' in after_check_mode_status.msg.lower()"
            fail_msg: "Check mode test failed - configuration was changed"
            success_msg: "Check mode test passed - configuration unchanged"

    # ----------------------------------------------------------------------------------- #
    # Test 6: Remove Depot Configuration
    # ----------------------------------------------------------------------------------- #
    - name: Test 6 - Remove Depot Configuration
      block:
        - name: Remove Depot Configuration
          broadcom.vcf.sddc_manager_depot:
            sddc_manager_hostname: "{{ test_sddc_manager_hostname }}"
            sddc_manager_user: "{{ test_sddc_manager_user }}"
            sddc_manager_password: "{{ test_sddc_manager_password }}"
            state: absent
          register: remove_depot_result

        - name: Display Remove Result
          ansible.builtin.debug:
            msg: "{{ remove_depot_result.msg }}"

        - name: Verify Depot Removed
          broadcom.vcf.sddc_manager_depot_info:
            sddc_manager_hostname: "{{ test_sddc_manager_hostname }}"
            sddc_manager_user: "{{ test_sddc_manager_user }}"
            sddc_manager_password: "{{ test_sddc_manager_password }}"
          register: after_remove_status

        - name: Display Depot Status After Removal
          ansible.builtin.debug:
            msg: "After Removal: {{ after_remove_status.msg }}"

    # ----------------------------------------------------------------------------------- #
    # Test 7: Remove Non-Existent Depot (idempotency for absent state)
    # ----------------------------------------------------------------------------------- #
    - name: Test 7 - Remove Non-Existent Depot
      block:
        - name: Try to Remove Depot Again (should be no change)
          broadcom.vcf.sddc_manager_depot:
            sddc_manager_hostname: "{{ test_sddc_manager_hostname }}"
            sddc_manager_user: "{{ test_sddc_manager_user }}"
            sddc_manager_password: "{{ test_sddc_manager_password }}"
            state: absent
          register: remove_again_result

        - name: Display Remove Again Result
          ansible.builtin.debug:
            msg: "Remove Again: {{ remove_again_result.msg }}"

        - name: Assert No Changes Made
          ansible.builtin.assert:
            that:
              - not remove_again_result.changed
            fail_msg: "Remove idempotency test failed"
            success_msg: "Remove idempotency test passed"

    # ----------------------------------------------------------------------------------- #
    # Summary
    # ----------------------------------------------------------------------------------- #
    - name: Display Test Summary
      ansible.builtin.debug:
        msg:
          - "===== TEST SUMMARY ====="
          - "Test 1 - Get Initial Status: COMPLETED"
          - "Test 2 - Configure Online Depot: COMPLETED"
          - "Test 3 - Switch to Offline Depot: COMPLETED"
          - "Test 4 - Idempotency Test: {{ 'PASSED' if not idempotency_result.changed else 'FAILED' }}"
          - "Test 5 - Check Mode Test: COMPLETED"
          - "Test 6 - Remove Depot: COMPLETED"
          - "Test 7 - Remove Idempotency: {{ 'PASSED' if not remove_again_result.changed else 'FAILED' }}"
          - "========================"

