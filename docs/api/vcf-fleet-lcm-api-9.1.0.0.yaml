openapi: 3.0.4
info:
  title: VCF Fleet LCM Service APIs
  version: 9.1.0.0
servers:
- description: VCF Fleet LCM Service APIs
  url: https://vcf.broadcom.com/fleet-lcm
security:
- bearerToken: []
tags:
- description: Fleet LCM Health APIs.
  name: Health
- description: Fleet LCM Configuration APIs.
  name: Config
- description: APIs for managing SDDC LCM registrations with Fleet LCM.
  name: SDDC LCM
- description: "Component installation, import, reconfiguration or backup APIs. These\
    \ APIs are subject to change in future VCF releases. Appropriate details around\
    \ such changes will be provided."
  name: Components
- description: "API to Generate, Download and Destroy component support bundles."
  name: SupportBundles
- description: Task APIs
  name: Task
- description: Network and server connectivity APIs.
  name: Network
- description: APIs for managing service registry capabilities.
  name: ServiceCapabilities
- description: Resources calculation APIs
  name: Resources
- description: Supported components APIs
  name: SupportedComponents
- description: APIs for managing upgrade plans. These APIs are subject to change in
    future VCF releases. Appropriate details around such changes will be provided.
  name: Upgrade Plan
- description: APIs for querying available release versions
  name: Release Version
- name: Fleet LCM System
paths:
  /v1/health:
    get:
      description: Get Fleet LCM Health.
      operationId: getHealth
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      security: []
      tags:
      - Health
  /v1/config:
    get:
      description: Retrieve the current configuration of Fleet LCM.
      operationId: getConfig
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Config
    post:
      description: Configure Fleet LCM by providing management VSP cluster's details.
      operationId: setConfig
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigSpec'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Config
  /v1/sddc-lcms:
    get:
      description: Get all SDDC LCMs registered with Fleet LCM.
      operationId: getSddcLcms
      parameters:
      - description: Backup schedule enabled.
        explode: true
        in: query
        name: backupScheduleEnabled
        required: false
        schema:
          type: boolean
        style: form
      - description: Backup storage configuration present.
        explode: true
        in: query
        name: backupStorageConfigured
        required: false
        schema:
          type: boolean
        style: form
      - description: "Page Number (1-based, defaults to 1)"
        explode: true
        in: query
        name: pageNumber
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - description: Page Size. Maximum allowed is 100
        explode: true
        in: query
        name: pageSize
        required: false
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SddcLcms'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - SDDC LCM
    patch:
      description: Bulk update of SDDC LCM endpoint configuration
      operationId: updateSddcLcms
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SddcLcmUpdateSpecs'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - SDDC LCM
    post:
      description: Register SDDC LCM with Fleet LCM.
      operationId: registerSddcLcm
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SddcLcmRegisterSpec'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SddcLcmRegistrationResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - SDDC LCM
  /v1/sddc-lcms/{sddcLcmId}:
    get:
      description: Get a registered SDDC LCM by ID.
      operationId: getSddcLcm
      parameters:
      - description: Id of SDDC LCM.
        explode: true
        in: path
        name: sddcLcmId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SddcLcm'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - SDDC LCM
    patch:
      description: Update SDDC LCM details (such as Fleet Depot associated with it).
      operationId: updateSddcLcm
      parameters:
      - description: Id of SDDC LCM.
        explode: true
        in: path
        name: sddcLcmId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SddcLcmUpdateSpec'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - SDDC LCM
  /v1/sddc-lcms/{sddcLcmId}/refresh:
    post:
      description: |
        Initiate an SDDC LCM refresh to sync inventory, component status, and configuration information from the SDDC LCM instance.
      operationId: refreshSddcLcm
      parameters:
      - description: Id of SDDC LCM.
        explode: true
        in: path
        name: sddcLcmId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - SDDC LCM
  /v1/sddc-lcms/{sddcLcmId}/backups:
    get:
      description: List backups for a SDDC LCM. Implicitly sorted by name.
      operationId: getSddcLcmBackups
      parameters:
      - description: Id of SDDC LCM.
        explode: true
        in: path
        name: sddcLcmId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: Component ID.
        explode: true
        in: query
        name: componentId
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - description: "The earliest date for which to list items, formatted as 2025-09-12T16:09:53Z."
        explode: true
        in: query
        name: periodStart
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: "The latest date for which to list items, formatted as 2025-09-12T16:09:53Z."
        explode: true
        in: query
        name: periodEnd
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: "Page Number (1-based, defaults to 1)"
        explode: true
        in: query
        name: pageNumber
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - description: Page Size. Maximum allowed is 100
        explode: true
        in: query
        name: pageSize
        required: false
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComponentBackups'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - SDDC LCM
    post:
      description: Initiate a backup or restore for the components in this SDDC LCM.
      operationId: backupRestoreSddcLcmAction
      parameters:
      - description: Id of SDDC LCM.
        explode: true
        in: path
        name: sddcLcmId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackupRestoreSpec'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - SDDC LCM
  /v1/sddc-lcms/{sddcLcmId}/inventory/datastores:
    get:
      description: List inventory datastores for a SDDC LCM.
      operationId: getSddcLcmInventoryDatastores
      parameters:
      - description: Id of SDDC LCM.
        explode: true
        in: path
        name: sddcLcmId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: "Page Number (1-based, defaults to 1)"
        explode: true
        in: query
        name: pageNumber
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - description: Page Size. Maximum allowed is 100
        explode: true
        in: query
        name: pageSize
        required: false
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryDatastores'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - SDDC LCM
  /v1/components:
    get:
      description: Get components by filter criteria and helps paginate based on sddclcms.
      operationId: getComponents
      parameters:
      - description: SDDC LCM identifier to filter by.
        explode: true
        in: query
        name: sddcLcmId
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - description: The fqdn of the VSP cluster on which the components to filter
          for are deployed.
        explode: true
        in: query
        name: vspClusterFqdn
        required: false
        schema:
          type: string
        style: form
      - description: Component scope to filter by.
        explode: true
        in: query
        name: scope
        required: false
        schema:
          enum:
          - FLEET
          - INSTANCE
          type: string
        style: form
      - description: Whether backup is allowed or not for this component.
        explode: true
        in: query
        name: backupAllowed
        required: false
        schema:
          type: boolean
        style: form
      - description: Whether to include the vsp consumption cluster.
        explode: true
        in: query
        name: includeConsumptionVsp
        required: false
        schema:
          type: boolean
        style: form
      - description: Whether to include the VCD Migrator component.
        explode: true
        in: query
        name: includeVcdMigrator
        required: false
        schema:
          type: boolean
        style: form
      - description: "Page Number (1-based, defaults to 1)"
        explode: true
        in: query
        name: pageNumber
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - description: Page Size. Maximum allowed is 100
        explode: true
        in: query
        name: pageSize
        required: false
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Components'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
    post:
      description: Install new or import existing component(s).
      operationId: createComponents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComponentSpecs'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
  /v1/components/validations:
    post:
      description: Validate input for installing new or import existing component(s).
      operationId: validateCreateComponents
      parameters:
      - in: header
        name: Accept-Language
        required: false
        schema:
          example: en-US
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComponentSpecs'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
  /v1/components/status:
    post:
      description: Fetches the status fields for components with the given ids.
      operationId: fetchComponentStatuses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComponentStatusesSpec'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComponentStatuses'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
  /v1/components/{componentId}:
    get:
      description: Get a Component.
      operationId: getComponent
      parameters:
      - description: Component Identifier.
        explode: true
        in: path
        name: componentId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Component'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
    patch:
      description: Update component deployment by scaling out (adding more nodes to
        it).
      operationId: updateComponent
      parameters:
      - description: Component Identifier.
        explode: true
        in: path
        name: componentId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComponentUpdateSpec'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
    post:
      description: "Perform an action on a component. Supported actions include refresh,\
        \ shutdown, restart, start."
      operationId: performComponentAction
      parameters:
      - description: Component Identifier.
        explode: true
        in: path
        name: componentId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: Component action to perform.
        explode: true
        in: query
        name: action
        required: true
        schema:
          enum:
          - shutdown
          - restart
          - start
          - refresh
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/performComponentAction_request'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
  /v1/components/{componentId}/validations:
    post:
      description: Validate the input for updating component deployment.
      operationId: validateUpdateComponent
      parameters:
      - in: header
        name: Accept-Language
        required: false
        schema:
          example: en-US
          type: string
      - description: Component Identifier.
        explode: true
        in: path
        name: componentId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComponentUpdateSpec'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
  /v1/components/{componentId}/config:
    get:
      description: Get a Component's config.
      operationId: getComponentConfig
      parameters:
      - description: Component Identifier.
        explode: true
        in: path
        name: componentId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComponentConfig'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
    patch:
      description: Update a Component's config.
      operationId: updateComponentConfig
      parameters:
      - description: Component Identifier.
        explode: true
        in: path
        name: componentId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComponentConfigUpdateSpec'
      responses:
        "202":
          content:
