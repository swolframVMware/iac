          description: The exact target version to which the component should be upgraded.
          example: 9.1.0.0000.1234567
          type: string
      required:
      - version
      type: object
    PolicySpec:
      description: |
        Specific policies to apply during the component's upgrade lifecycle.
        This object allows for arbitrary key-value pairs specific to the component or operation.
      type: object
    DepotSpec:
      description: |
        Details for accessing the software depot where the component's upgrade manifest or package is located.
      properties:
        url:
          description: |
            The URL pointing to the component's upgrade manifest, package, or the root of its upgrade repository in the depot.
          example: https://fds.vsphere.com/component-x/v9.1.0/upgrade-manifest
          format: uri
          type: string
        certificate:
          description: |
            A list of base64-encoded strings representing certificates (e.g., PEM format) required to authenticate with the depot.
          example:
          - LS0tLS1CRUdJTiBDRVJUSUZJQ0FUR...
          - MIIDMjCCAhegAwIBAgIQI...0tRU5EIENFUlRJRklDQVRF
          items:
            type: string
          type: array
      required:
      - url
      type: object
    AdditionalInputSpec:
      description: |
        Additional inputs required for component upgrade.
        This object allows for arbitrary key-value pairs specific to the component or operation.
      type: object
    LcmPlatformSpec:
      description: |
        Lifecycle Management (LCM) specific options controlling the behavior of the upgrade process itself.
      properties:
        performBackup:
          default: false
          description: |
            If true, the system will attempt to create a backup of the component's current state before proceeding with the upgrade.
          example: false
          type: boolean
      required:
      - performBackup
      type: object
    performComponentAction_request:
      discriminator:
        mapping:
          ComponentRefreshActionSpec: '#/components/schemas/ComponentRefreshActionSpec'
        propertyName: type
      oneOf:
      - $ref: '#/components/schemas/ComponentRefreshActionSpec'
    VidbConfigSpec_ingress_vidb_vips:
      properties:
        ipv4:
          items:
            type: string
          type: array
      type: object
    VidbConfigSpec_ingress_vidb:
      properties:
        fqdn:
          type: string
        vips:
          $ref: '#/components/schemas/VidbConfigSpec_ingress_vidb_vips'
        tls:
          $ref: '#/components/schemas/IngressTlsSpec'
      type: object
    VidbConfigSpec_ingress:
      properties:
        vidb:
          $ref: '#/components/schemas/VidbConfigSpec_ingress_vidb'
      type: object
    VcfaConfigSpecIngressVcfaVips:
      properties:
        ipv4:
          items:
            type: string
          type: array
      title: VcfaConfigSpecIngressVcfaVips
      type: object
    VcfaConfigSpecIngressVcfa:
      properties:
        fqdn:
          type: string
        vips:
          $ref: '#/components/schemas/VcfaConfigSpecIngressVcfaVips'
        tls:
          $ref: '#/components/schemas/IngressTlsSpec'
      title: VcfaConfigSpecIngressVcfa
      type: object
    VcfaConfigSpec_ingress:
      properties:
        vcfa:
          $ref: '#/components/schemas/VcfaConfigSpecIngressVcfa'
      type: object
    OpsLogsConfigSpec_ingress_component_vips:
      properties:
        ipv4:
          items:
            type: string
          type: array
        ipv6:
          items:
            type: string
          type: array
      type: object
    OpsLogsConfigSpec_ingress_component:
      properties:
        fqdns:
          items:
            type: string
          type: array
        vips:
          $ref: '#/components/schemas/OpsLogsConfigSpec_ingress_component_vips'
        tls:
          $ref: '#/components/schemas/IngressTlsSpec'
      type: object
    OpsLogsConfigSpec_ingress:
      properties:
        component:
          $ref: '#/components/schemas/OpsLogsConfigSpec_ingress_component'
      type: object
    OpsLogsConfigSpec_migrationSpec:
      properties:
        fqdn:
          type: string
        adminUsername:
          type: string
        adminPassword:
          format: password
          type: string
        sslThumbprint:
          type: string
        certificate:
          type: string
      required:
      - adminPassword
      - fqdn
      type: object
    FleetDepotConfigSpecDepotService:
      description: Fleet Depot service configuration
      properties:
        scope:
          description: "Scope of the Fleet Depot service. FLEET for primary instance,\
            \ INSTANCE for secondary instance."
          enum:
          - FLEET
          - INSTANCE
          type: string
      required:
      - scope
      title: FleetDepotConfigSpecDepotService
      type: object
    Task_taskSummary:
      description: |
        Summary information about sub tasks.
        See sample-task-example.yaml for examples of how this summary is calculated.
      example:
        totalSteps: 6
        totalSubTasks: 0
      properties:
        totalSubTasks:
          description: Total number of sub tasks in this task
          type: integer
        totalSteps:
          description: Total number of steps across all sub tasks and this task
          type: integer
      readOnly: true
      type: object
    Task_result:
      discriminator:
        mapping:
          PRECHECK: '#/components/schemas/PrecheckResult'
          OPS_LOGS_UPGRADE: '#/components/schemas/OpsLogsUpgradeResult'
          VALIDATION: '#/components/schemas/ValidationResult'
        propertyName: type
      oneOf:
      - $ref: '#/components/schemas/PrecheckResult'
      - $ref: '#/components/schemas/OpsLogsUpgradeResult'
      - $ref: '#/components/schemas/ValidationResult'
