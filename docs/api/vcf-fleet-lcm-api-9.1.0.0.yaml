  /v1/upgrade-plans/{planId}:
    get:
      description: Get an upgrade plan with optional component filtering by status
        and target version
      operationId: getUpgradePlan
      parameters:
      - description: Upgrade Plan Id
        explode: true
        in: path
        name: planId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: Components Page Number
        explode: true
        in: query
        name: componentsPageNumber
        required: false
        schema:
          type: integer
        style: form
      - description: Components Page Size. Maximum allowed is 100
        explode: true
        in: query
        name: componentsPageSize
        required: false
        schema:
          type: integer
        style: form
      - description: Filter components by SDDC LCM ID. Multiple values can be provided
          as comma-separated list.
        explode: true
        in: query
        name: componentSddcLcmId
        required: false
        schema:
          example:
          - c5abbd8c-b94e-40d3-bc0e-68e9b0a4489a
          - 2547462d-f206-4e18-abf8-7a413aaba306
          items:
            format: uuid
            type: string
          type: array
          uniqueItems: true
        style: form
      - description: Filter components by status. Multiple values can be provided
          as comma-separated list.
        explode: true
        in: query
        name: componentStatus
        required: false
        schema:
          example:
          - ELIGIBLE
          - PENDING
          items:
            $ref: '#/components/schemas/UpgradePlanComponentEligibilityStatus'
          type: array
          uniqueItems: true
        style: form
      - description: "Filter components by target version(allows usage of partial\
          \ matching). Multiple values can be provided as comma-separated list. Each\
          \ filter value will match any component whose target version starts with\
          \ the filter value (e.g., '9.1' matches '9.1.0.0', '9.1.1.0', etc.)."
        explode: true
        in: query
        name: componentTargetVersion
        required: false
        schema:
          example:
          - "9.1"
          - "9.2"
          items:
            type: string
          type: array
          uniqueItems: true
        style: form
      - description: "Filter components by current version(allows usage of partial\
          \ matching). Multiple values can be provided as comma-separated list. Each\
          \ filter value will match any component whose current version starts with\
          \ the filter value (e.g., '9.1' matches '9.1.0.0', '9.1.1.0', etc.)."
        explode: true
        in: query
        name: componentCurrentVersion
        required: false
        schema:
          example:
          - "9.1"
          - "9.2"
          items:
            type: string
          type: array
          uniqueItems: true
        style: form
      - description: Filter components by public name using partial matching (case-insensitive).
          Multiple values can be provided as comma-separated list. Each filter value
          will match any component whose public name contains the filter value.
        explode: true
        in: query
        name: componentPublicName
        required: false
        schema:
          example:
          - VCF Fleet LCM
          - VCF Observability Data Platform
          items:
            type: string
          type: array
          uniqueItems: true
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpgradePlan'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
