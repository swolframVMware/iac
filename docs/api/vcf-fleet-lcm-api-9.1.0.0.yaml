      - Network
  /v1/tasks:
    get:
      description: Get all tasks
      operationId: getTasks
      parameters:
      - description: Task Status
        explode: true
        in: query
        name: status
        required: false
        schema:
          type: string
        style: form
      - description: Task Type
        explode: true
        in: query
        name: type
        required: false
        schema:
          type: string
        style: form
      - description: Filter tasks by creator (username or service account)
        in: query
        name: createdBy
        required: false
        schema:
          type: string
      - description: Filter tasks by name (internal name)
        in: query
        name: name
        required: false
        schema:
          type: string
      - description: Filter tasks by description (public name for the task)
        in: query
        name: description
        required: false
        schema:
          type: string
      - description: Filter tasks with start time greater than the specified timestamp
          (ISO 8601 format)
        in: query
        name: startTimeGt
        required: false
        schema:
          format: date-time
          type: string
      - description: Filter tasks with start time less than the specified timestamp
          (ISO 8601 format)
        in: query
        name: startTimeLt
        required: false
        schema:
          format: date-time
          type: string
      - description: Filter tasks with update time greater than the specified timestamp
          (ISO 8601 format)
        in: query
        name: updateTimeGt
        required: false
        schema:
          format: date-time
          type: string
      - description: Filter tasks with update time less than the specified timestamp
          (ISO 8601 format)
        in: query
        name: updateTimeLt
        required: false
        schema:
          format: date-time
          type: string
      - description: Filter tasks with end time greater than the specified timestamp
          (ISO 8601 format)
        in: query
        name: endTimeGt
        required: false
        schema:
          format: date-time
          type: string
      - description: Filter tasks with end time less than the specified timestamp
          (ISO 8601 format)
        in: query
        name: endTimeLt
        required: false
        schema:
          format: date-time
          type: string
      - description: Filter tasks by resource ID
        in: query
        name: resourceId
        required: false
        schema:
          type: string
      - description: Filter tasks by resource type
        in: query
        name: resourceType
        required: false
        schema:
          type: string
      - description: Whether to include system/internal tasks in the response. Defaults
          to false (only customer-visible tasks).
        in: query
        name: includeSystemTasks
        required: false
        schema:
          default: false
          type: boolean
      - description: "Page Number (1-based, defaults to 1)"
        explode: true
        in: query
        name: pageNumber
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - description: Page Size. Maximum allowed is 100
        explode: true
        in: query
        name: pageSize
        required: false
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageOfTaskSummary'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageOfTaskSummary'
          description: Internal Server Error
      summary: Get all tasks
      tags:
      - Task
