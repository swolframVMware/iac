  /v1/depot-metadata?action=sync:
    post:
      description: |
        Manually trigger depot metadata synchronization.

        This endpoint allows on-demand synchronization of depot metadata, which is typically
        scheduled to run automatically via cron job. The operation is asynchronous and
        returns a task ID for tracking the sync progress.

        The sync operation downloads and updates:
        - Product Version Catalog (PVC) from the depot service
        - Unified Release Manifest (URM) from the depot service

        **Concurrency Control:**
        - Only one depot metadata sync operation can run at a time
        - Returns the currently running task if a sync is already in progress
        - Conflicts can occur with both manual and scheduled sync operations

        **Examples:**
        - POST /v1/depot-metadata?action=sync - Trigger manual depot metadata sync
      operationId: syncDepotMetadata
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted - Depot metadata sync task started or existing task
            returned
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad Request - Invalid request parameters
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal Server Error
      tags:
      - Depot Metadata
