# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.network_pool_info
# ----------------------------------------------------------------------------------- #
# Description:
#   This role is responsible for retrieving information about a network pool in a
#   VMware Cloud Foundation instance.
# ----------------------------------------------------------------------------------- #

- name: Get Network Pool Information
  broadcom.vcf.sddc_manager_network_pool_info:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    network_pool_name: "{{ all_iac_vars.vsphere.datacenter.clusters[0].host_pool.name }}"
  register: network_pool_info

- name: Set Network Pool ID
  ansible.builtin.set_fact:
    network_pool_id: "{{ network_pool_info.network_pool.id }}"