# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.cluster
# Task: Add Cluster
# ----------------------------------------------------------------------------------- #
# Description:
# This task adds a cluster to a workload domain in a VMware Cloud Foundation instance.
# ----------------------------------------------------------------------------------- #

- name: Add Cluster to Workload Domain
  broadcom.vcf.sddc_manager_cluster:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    state: present
    cluster_payload: "{{ api_payload_json }}"
  register: add_result

- name: Set Add Cluster Task ID
  ansible.builtin.set_fact:
    cluster_task_id: "{{ add_result.meta.id | default(omit) }}"
  when:
    - not ansible_check_mode
    - add_result.meta.id is defined

- name: Wait for Add Cluster Task to Complete
  broadcom.vcf.sddc_manager_tasks_status:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    task_id: "{{ cluster_task_id }}"
    sddc_manager_task_type: clusters
    validation: false
    retries: 240
    delay: 30
  register: add_task_result
  when:
    - not ansible_check_mode
    - cluster_task_id is defined

- name: Fail if Add Cluster Task Returned Errors
  ansible.builtin.fail:
    msg: "Failed to add cluster '{{ cluster_input }}'. Error codes: {{ add_task_result.meta.error_codes }}"
  when:
    - not ansible_check_mode
    - cluster_task_id is defined
    - add_task_result.meta is defined
    - add_task_result.meta.error_codes is defined

- name: Display Add Cluster Result
  ansible.builtin.debug:
    msg: "{{ add_result.msg }}"
