# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.cluster
# Task: Ensure Cluster is Absent
# ----------------------------------------------------------------------------------- #
# Description:
# This task ensures that a specified cluster is removed from a VMware Cloud
# Foundation instance. The task performs the following steps:
# - Look up the cluster by name -> ID.
# - Collect host information (if decommissioning is enabled).
# - Remove the cluster.
# - Wait for the removal task to complete.
# - Decommission hosts (if enabled).
# ----------------------------------------------------------------------------------- #

- name: Lookup Cluster by Name
  ansible.builtin.include_tasks: lookup_cluster.yml

- name: Get Cluster Host Information
  ansible.builtin.include_tasks: decommission_info.yml
  when:
    - cluster_decommission_hosts | bool

- name: Remove Cluster
  ansible.builtin.include_tasks: remove_cluster.yml

- name: Decommission Cluster Hosts
  ansible.builtin.include_tasks: decommission_resources.yml
  when:
    - cluster_decommission_hosts | bool
    - hosts_to_decommission is defined
    - hosts_to_decommission | length > 0
