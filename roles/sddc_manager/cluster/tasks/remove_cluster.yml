# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.cluster
# Task: Remove Cluster
# ----------------------------------------------------------------------------------- #
# Description:
# This task removes a cluster in a VMware Cloud Foundation instance.
# ----------------------------------------------------------------------------------- #

- name: Remove Cluster
  broadcom.vcf.sddc_manager_cluster:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    state: absent
    cluster_payload:
      id: "{{ cluster_id }}"
  register: remove_result

- name: Set Remove Cluster Task ID
  ansible.builtin.set_fact:
    cluster_task_id: "{{ remove_result.meta.id | default(omit) }}"
  when:
    - not ansible_check_mode
    - remove_result.meta.id is defined

- name: Wait for Remove Cluster Task to Complete
  broadcom.vcf.sddc_manager_tasks_status:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    task_id: "{{ cluster_task_id }}"
    sddc_manager_task_type: clusters
    validation: false
    retries: 240
    delay: 30
  register: remove_task_result
  when:
    - not ansible_check_mode
    - cluster_task_id is defined

- name: Fail if Remove Cluster Task Returned Errors
  ansible.builtin.fail:
    msg: "Failed to remove cluster ID {{ cluster_id }}. Error codes: {{ remove_task_result.meta.error_codes }}"
  when:
    - not ansible_check_mode
    - remove_task_result.meta is defined
    - remove_task_result.meta.error_codes is defined

- name: Display Remove Cluster Result
  ansible.builtin.debug:
    msg: "{{ remove_result.msg }}"
