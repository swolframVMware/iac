# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.cluster
# Task: Lookup Cluster ID by Name
# ----------------------------------------------------------------------------------- #
# Description:
# This task looks up a cluster ID by its name.
# ----------------------------------------------------------------------------------- #

- name: Display Status Message
  ansible.builtin.debug:
    msg: "{{ ansible_check_mode | ternary('Check Mode: Would lookup', 'Looking up') }} cluster '{{ cluster_input }}' ID."

- name: Lookup Cluster ID by Name
  broadcom.vcf.sddc_manager_cluster_info:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    cluster_name: "{{ cluster_input }}"
  register: cluster_info

- name: Extract Cluster ID
  ansible.builtin.set_fact:
    cluster_id: "{{ cluster_info.cluster.id }}"

- name: Display Status Message
  ansible.builtin.debug:
    msg: "{{ ansible_check_mode | ternary('Check Mode: Would have returned', 'Returned') }} cluster '{{ cluster_input }}' with ID '{{ cluster_id }}'."
