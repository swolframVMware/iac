# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.ntp
# ----------------------------------------------------------------------------------- #
# Description:
#   This role is responsible for updating ntp configuration in a
#   VMware Cloud Foundation instance.
# ----------------------------------------------------------------------------------- #

- name: Find NTP in IaC Configuration
  ansible.builtin.set_fact:
    ntp_config:
      ntpServers: "{{ all_iac_vars.ntp | map('regex_replace', '^(.*)$', '{\"ipAddress\": \"\\1\"}') | map('from_json') | list | default(none) }}"

- name: Fail if NTP Not Found
  ansible.builtin.fail:
    msg: "NTP is not found in IaC configuration at vsphere.ntp"
  when: ntp_config is none

- name: Validate NTP Configuration
  ansible.builtin.include_tasks: validate_ntp_config.yml

- name: Update NTP Configuration
  ansible.builtin.include_tasks: update_ntp_config.yml
