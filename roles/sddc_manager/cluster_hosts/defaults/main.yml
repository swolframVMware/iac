# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.cluster_hosts
# ----------------------------------------------------------------------------------- #
# Description:
# This file contains the default values for the role to work as expected.
# ----------------------------------------------------------------------------------- #

# Desired state of cluster host membership.
# Valid values: present, absent
cluster_hosts_state: present

# Template name for add hosts payload
add_hosts_template_name: "add_hosts.j2"

# Maximum hosts allowed in cluster (safety check for scale-out)
# Set to 0 or omit to disable the check.
maximum_cluster_hosts: 64

# Force addition even if exceeding maximum
force_host_addition: false

# Template name for remove hosts payload
remove_hosts_template_name: "remove_hosts.j2"

# Minimum hosts required in cluster (safety check for scale-in)
# Set to 0 or omit to disable the check.
minimum_cluster_hosts: 3

# Force removal even if below minimum
force_host_removal: false

# Decommission unassigned/unusable hosts after hosts are removed from the cluster.
cluster_hosts_decommission_hosts: true
