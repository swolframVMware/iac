# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.cluster_hosts
# ----------------------------------------------------------------------------------- #
# Description:
#   This role manages host membership in a cluster, supporting both adding and
#   removing hosts in an idempotent way.
# ----------------------------------------------------------------------------------- #

- name: Get Cluster Information
  ansible.builtin.include_role:
    name: broadcom.vcf.sddc_manager.cluster_info

- name: Dispatch to Add Hosts Workflow
  ansible.builtin.include_tasks: present.yml
  when: cluster_hosts_state | lower == 'present'

- name: Dispatch to Remove Hosts Workflow
  ansible.builtin.include_tasks: absent.yml
  when: cluster_hosts_state | lower == 'absent'