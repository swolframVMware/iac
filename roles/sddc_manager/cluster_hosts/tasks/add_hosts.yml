# Role: sddc_manager.cluster_hosts
# Task: Add Hosts to Cluster
# ----------------------------------------------------------------------------------- #

- name: Add Hosts to Cluster
  broadcom.vcf.sddc_manager_cluster_hosts:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    state: present
    cluster_id: "{{ cluster_id }}"
    cluster_payload: "{{ api_payload_json }}"
  register: add_result

- name: Wait for Add Hosts Task
  broadcom.vcf.sddc_manager_tasks_status:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    task_id: "{{ add_result.meta.id }}"
    sddc_manager_task_type: clusters
    validation: false
    retries: 120
    delay: 30
  register: task_result
  when:
    - not ansible_check_mode
    - add_result.meta is defined
    - add_result.meta.id is defined

- name: Check for Errors
  ansible.builtin.fail:
    msg: "Failed to add hosts: {{ task_result.meta.error_codes }}"
  when:
    - not ansible_check_mode
    - task_result.meta is defined
    - task_result.meta.error_codes is defined

- name: Display Add Result
  ansible.builtin.debug:
    msg: "{{ add_result.msg | default(add_result.meta.message | default('Operation completed.')) }}"
