# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.cluster_hosts
# Task: Decommission Removed Hosts
# ----------------------------------------------------------------------------------- #
# Description:
#   This task decommissions hosts that were removed from the cluster.
#   It is only executed when decommission_removed_hosts is true (the default).
# ----------------------------------------------------------------------------------- #

- name: Verify Hosts Ready to Remove List is Available
  ansible.builtin.assert:
    that:
      - hosts_ready_to_remove is defined
      - hosts_ready_to_remove | length > 0
    fail_msg: "No hosts found to decommission. Host information must be collected before decommissioning."
    success_msg: "Found {{ hosts_ready_to_remove | length }} host(s) to decommission."
  when: not ansible_check_mode

- name: Decommission Removed Hosts
  ansible.builtin.include_role:
    name: broadcom.vcf.sddc_manager.host
  vars:
    hosts_input: "{{ hosts_ready_to_remove }}"
    host_state: absent
    host_validate: false
  when: not ansible_check_mode

- name: Display Decommission Summary
  ansible.builtin.debug:
    msg: >-
      {{ ansible_check_mode | ternary(
        'Check Mode: Would decommission',
        'Successfully decommissioned'
      ) }}
      {{ hosts_ready_to_remove | length }}
      host(s) from cluster '{{ cluster_input }}': {{ hosts_ready_to_remove | join(', ') }}

