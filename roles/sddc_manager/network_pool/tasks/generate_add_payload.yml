# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.network_pool
# Task: Generate Add Network Pool Payload
# ----------------------------------------------------------------------------------- #
# Description:
#   This task is responsible for generating the payload to add a network pool in a
#   VMware Cloud Foundation instance.
# ----------------------------------------------------------------------------------- #

- name: Find Network Pool in IaC Configuration
  ansible.builtin.set_fact:
    found_network_pool: "{{ all_iac_vars.vsphere.datacenter.clusters | selectattr('host_pool.name', 'equalto', network_pool_name) | map(attribute='host_pool') | first | default(none) }}"

- name: Fail if Network Pool Not Found
  ansible.builtin.fail:
    msg: "Network pool '{{ network_pool_name }}' not found in IaC configuration at vsphere.datacenter.clusters[*].host_pool"
  when: found_network_pool is none

- name: Generate Network Pool Payload
  ansible.builtin.include_role:
    name: broadcom.vcf.iac.generate_api_payload
  vars:
    template_name: "{{ network_pool_add_template_name }}"
    network_pool: "{{ found_network_pool }}"