# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.network_pool
# Task: Remove Network Pool
# ----------------------------------------------------------------------------------- #
# Description:
#   This task is responsible for removing a network pool from a VMware Cloud
#   Foundation instance.
# ----------------------------------------------------------------------------------- #

- name: Remove Network Pool
  broadcom.vcf.sddc_manager_network_pool:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    network_pool_name: "{{ network_pool_name }}"
    state: absent
  register: remove_result

- name: Display Remove Result
  ansible.builtin.debug:
    msg: "{{ remove_result.msg }}"
