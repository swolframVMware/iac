# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.network_pool
# Task: Ensure Network Pool is Present
# ----------------------------------------------------------------------------------- #
# Description:
# This task ensures that a specified network pool exists in a VMware Cloud
# Foundation instance.
# ----------------------------------------------------------------------------------- #

- name: Find Network Pool in IaC Configuration
  ansible.builtin.set_fact:
    network_pool_name: "{{ all_iac_vars.vsphere.datacenter.clusters[0].host_pool.name | default(none) }}"

- name: Fail if Network Pool Not Found
  ansible.builtin.fail:
    msg: "Network pool name is not found in IaC configuration at vsphere.datacenter.clusters[*].host_pool"
  when: network_pool_name is none

- name: Generate Network Pool Payload
  ansible.builtin.include_tasks: generate_add_payload.yml

- name: Add Network Pool
  ansible.builtin.include_tasks: add_network_pool.yml