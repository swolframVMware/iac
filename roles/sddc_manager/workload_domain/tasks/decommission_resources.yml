# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.workload_domain
# Task: Decommission Workload Domain Resources
# ----------------------------------------------------------------------------------- #
# Description:
# This task decommissions hosts that were part of the removed workload domain.
# ----------------------------------------------------------------------------------- #

- name: Verify Host List is Available
  ansible.builtin.assert:
    that:
      - hosts_to_decommission is defined
      - hosts_to_decommission | length > 0
    fail_msg: "No hosts found to decommission. Host information must be collected before domain removal."
    success_msg: "Found {{ hosts_to_decommission | length }} host(s) to decommission."
  when: not ansible_check_mode

- name: Decommission Workload Domain Hosts
  ansible.builtin.include_role:
    name: broadcom.vcf.sddc_manager.host
  vars:
    hosts_input: "{{ hosts_to_decommission }}"
    host_state: absent
    host_validate: false
  register: decommission_result
  when: not ansible_check_mode

- name: Display Decommission Summary
  ansible.builtin.debug:
    msg: >-
      {{ ansible_check_mode | ternary(
        'Check Mode: Would decommission',
        'Successfully decommissioned'
      ) }}
      {{ hosts_to_decommission | length }}
      host(s) from workload domain '{{ workload_domain_name }}': {{ hosts_to_decommission | join(', ') }}
