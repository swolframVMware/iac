# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.workload_domain
# Task: Collect Workload Domain Resources for Decommissioning
# ----------------------------------------------------------------------------------- #
# Description:
# This task collects cluster and host information from the workload domain BEFORE
# it is removed, so that hosts can be decommissioned after domain removal.
# ----------------------------------------------------------------------------------- #

- name: Get All Clusters
  broadcom.vcf.sddc_manager_cluster_info:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
  register: all_clusters_result
  failed_when: false

- name: Filter Clusters by Workload Domain ID
  ansible.builtin.set_fact:
    workload_domain_clusters: >-
      {{
        all_clusters_result.clusters | default([])
        | selectattr('domain', 'defined')
        | selectattr('domain.id', 'equalto', workload_domain_id)
        | list
      }}

- name: Build Host ID List from Cluster Data
  ansible.builtin.set_fact:
    host_ids_to_decommission: >-
      {{
        workload_domain_clusters
        | selectattr('hosts', 'defined')
        | map(attribute='hosts')
        | flatten
        | map(attribute='id')
        | list
      }}
  when: workload_domain_clusters | length > 0

- name: Get All Hosts
  broadcom.vcf.sddc_manager_host_info:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
  register: all_hosts_result
  when:
    - host_ids_to_decommission is defined
    - host_ids_to_decommission | length > 0

- name: Build Host Decommission List for Workload Domain
  ansible.builtin.set_fact:
    hosts_to_decommission: >-
      {{
        all_hosts_result.meta.values() | list
        | selectattr('id', 'in', host_ids_to_decommission)
        | map(attribute='fqdn')
        | list
      }}
  when:
    - all_hosts_result is defined
    - all_hosts_result.meta is defined
    - host_ids_to_decommission is defined

- name: Display Hosts to Decommission
  ansible.builtin.debug:
    msg: "Collected {{ hosts_to_decommission | default([]) | length }} host(s) for decommissioning from workload domain '{{ workload_domain_name }}': {{ hosts_to_decommission | default([]) | join(', ') }}."
  when:
    - hosts_to_decommission is defined
