# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.workload_domain
# Task: Validatre Create Workload Domain Payload
# ----------------------------------------------------------------------------------- #
# Description:
# This task validates the API payload required to create a workload domain in a VMware
# Cloud Foundation instance.
# ----------------------------------------------------------------------------------- #

- name: Display Status Message
  ansible.builtin.debug:
    msg: "{{ ansible_check_mode | ternary('Check Mode: Would validate', 'Validating') }} workload domain '{{ domain_name | default(domain) | default(all_iac_vars.domain.name) }}' payload."

- name: Validate Workload Domain Payload
  broadcom.vcf.sddc_manager_workload_domain:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ sddc_manager_admin_password | default(all_iac_vars.sddc_manager.admin_password) }}"
    state: present
    validate_only: true
    workload_domain_payload: "{{ api_payload_json }}"
  register: validate_result
  when: not ansible_check_mode

- name: Fail if Validation Returned Errors
  ansible.builtin.fail:
    msg: "Failed to validate workload domain payload. Errors: {{ validate_result.meta.errors | default([]) | to_nice_yaml }}"
  when:
    - not ansible_check_mode
    - validate_result.meta is defined
    - validate_result.meta.errors is defined
    - validate_result.meta.errors | length > 0

- name: Display Success Message
  ansible.builtin.debug:
    msg: "{{ ansible_check_mode | ternary('Check Mode: Would have validated', 'Successfully validated') }} workload domain '{{ domain_name | default(domain) | default(all_iac_vars.domain.name) }}' payload."
