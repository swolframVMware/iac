# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.trusted_certificate
# ----------------------------------------------------------------------------------- #
# Description:
#   This role is responsible for managing trusted certificates in the SDDC Manager
#   trust store.
# ----------------------------------------------------------------------------------- #
# Variables:
#   Required:
#   - trusted_certificate            : The certificate in PEM format.
#   Optional:
#   - trusted_certificate_usage_type : The certificate usage type. Default: TRUSTED_FOR_OUTBOUND.
#   - trusted_certificate_state      : The desired state. Default: present.
# ----------------------------------------------------------------------------------- #

- name: Validate Trusted Certificate Variables
  ansible.builtin.assert:
    that:
      - trusted_certificate is defined
      - trusted_certificate | length > 0
      - trusted_certificate_state | default('present') in ['present', 'absent']
    fail_msg: >-
      trusted_certificate must be defined and contain a valid PEM certificate,
      and trusted_certificate_state must be 'present' or 'absent'.

- name: Manage Trusted Certificate
  broadcom.vcf.sddc_manager_trusted_certificate:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    certificate: "{{ trusted_certificate }}"
    certificate_usage_type: "{{ trusted_certificate_usage_type | default('TRUSTED_FOR_OUTBOUND') }}"
    state: "{{ trusted_certificate_state | default('present') }}"
  register: trusted_certificate_result
