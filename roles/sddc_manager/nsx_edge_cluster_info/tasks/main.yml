# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.nsx_edge_cluster_info
# ----------------------------------------------------------------------------------- #
# Description:
#   This role is responsible for retrieving information about an NSX Edge cluster in a
#   VMware Cloud Foundation instance.
# ----------------------------------------------------------------------------------- #

- name: Get NSX Edge Cluster Information
  broadcom.vcf.sddc_manager_nsx_edge_cluster_info:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    edge_cluster_name: "{{ edge_cluster_name }}"
  register: edge_cluster_info
  when: edge_cluster_name is defined

- name: Get NSX Edge Cluster Information by ID
  broadcom.vcf.sddc_manager_nsx_edge_cluster_info:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    edge_cluster_id: "{{ edge_cluster_id }}"
  register: edge_cluster_info
  when: edge_cluster_id is defined

- name: Get All NSX Edge Clusters Information
  broadcom.vcf.sddc_manager_nsx_edge_cluster_info:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
  register: edge_cluster_info
  when:
    - edge_cluster_name is not defined
    - edge_cluster_id is not defined

- name: Set Edge Cluster ID
  ansible.builtin.set_fact:
    edge_cluster_id: "{{ edge_cluster_info.edge_cluster.id }}"
  when:
    - edge_cluster_info.edge_cluster is defined
    - edge_cluster_name is defined or edge_cluster_id is defined