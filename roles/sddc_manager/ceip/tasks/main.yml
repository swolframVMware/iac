# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.ceip
# ----------------------------------------------------------------------------------- #
# Description:
#   This role is responsible for managing CEIP status in a VMware Cloud Foundatio
#   instance.
# ----------------------------------------------------------------------------------- #

- name: Manage CEIP Status
  broadcom.vcf.sddc_manager_ceip:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    state: "{{ ceip_state }}"
  register: ceip_result

- name: Display CEIP Status Message
  ansible.builtin.debug:
    msg: "{{ ceip_result.msg }}"

- name: Wait for CEIP Task to Complete
  broadcom.vcf.sddc_manager_tasks_status:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    task_id: "{{ ceip_result.task.id }}"
    validation: false
    retries: 60
    delay: 10
  register: ceip_task_result
  when:
    - not ansible_check_mode
    - ceip_result.changed
    - ceip_result.task is defined
    - ceip_result.task.id is defined

- name: Verify CEIP Status
  broadcom.vcf.sddc_manager_ceip_info:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
  register: ceip_verify_result
  when:
    - not ansible_check_mode
    - ceip_result.changed

- name: Display CEIP Result
  ansible.builtin.debug:
    msg: "{{ ceip_verify_result.msg }}"
  when:
    - not ansible_check_mode
    - ceip_result.changed
    - ceip_verify_result is defined
