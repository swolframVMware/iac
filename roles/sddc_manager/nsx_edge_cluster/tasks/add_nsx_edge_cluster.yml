# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.nsx_edge_cluster
# Task: Add NSX Edge Cluster
# ----------------------------------------------------------------------------------- #
# Description:
#   This task adds an NSX Edge cluster to a workload domain in a VMware Cloud
#   Foundation instance and monitors the task until completion.
#   In check mode, only validation is performed; no actual addition occurs.
# ----------------------------------------------------------------------------------- #

- name: Add NSX Edge Cluster
  broadcom.vcf.sddc_manager_nsx_edge_cluster:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    edge_cluster_payload: "{{ api_payload_json }}"
    state: present
    validate_only: false
  register: edge_cluster_result

- name: Display Check Mode Message
  ansible.builtin.debug:
    msg: "{{ edge_cluster_result.msg }}"
  when: ansible_check_mode

- name: Set NSX Edge Cluster Task ID
  ansible.builtin.set_fact:
    edge_cluster_task_id: "{{ edge_cluster_result.meta.id }}"
  when: not ansible_check_mode

- name: Monitor NSX Edge Cluster Creation Task
  broadcom.vcf.sddc_manager_tasks_status:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    task_id: "{{ edge_cluster_task_id }}"
    sddc_manager_task_type: nsxt_edge_cluster
    validation: false
    retries: 180
    delay: 60
  register: task_result
  when: not ansible_check_mode

- name: Check for Errors in Task Result
  ansible.builtin.fail:
    msg: "Failed to add NSX Edge cluster. Error codes: {{ task_result.meta.error_codes }}"
  when:
    - not ansible_check_mode
    - task_result.meta is defined
    - task_result.meta.error_codes is defined
    - task_result.meta.error_codes | length > 0

- name: Display Success Message
  ansible.builtin.debug:
    msg: "Successfully added NSX Edge cluster to workload domain."
  when: not ansible_check_mode