# ----------------------------------------------------------------------------------- #
# Role: sddc_manager.nsx_edge_cluster
# Task: Validate NSX Edge Cluster
# ----------------------------------------------------------------------------------- #
# Description:
#   This task validates the NSX Edge cluster payload before adding it to the
#   workload domain. This step is always performed, even in check mode.
# ----------------------------------------------------------------------------------- #

- name: Validate NSX Edge Cluster Payload
  broadcom.vcf.sddc_manager_nsx_edge_cluster:
    sddc_manager_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
    sddc_manager_user: "{{ all_iac_vars.vsphere.vcenter.sso.username }}"
    sddc_manager_password: "{{ vcenter_administrator_password | default(all_iac_vars.vsphere.vcenter.sso.password) }}"
    edge_cluster_payload: "{{ api_payload_json }}"
    state: present
    validate_only: true
  register: validation_result

- name: Display Validation Success
  ansible.builtin.debug:
    msg: "NSX Edge cluster payload validation successful."