# Role: sddc_manager.nsx_edge_cluster
# Task: Generate NSX Edge Cluster Payload
# ----------------------------------------------------------------------------------- #
# Description:
#   This task generates the payload to add an NSX Edge cluster to a workload domain
#   in a VMware Cloud Foundation instance.
# ----------------------------------------------------------------------------------- #

- name: Generate NSX Edge Cluster Payload
  ansible.builtin.include_role:
    name: broadcom.vcf.iac.generate_api_payload
  vars:
    template_name: "{{ edge_cluster_template_name }}"