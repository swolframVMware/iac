# ----------------------------------------------------------------------------------- #
# Role: vcf_installer.instance
# Task: Deploy VCF Instance
# ----------------------------------------------------------------------------------- #
# Description:
#    Deploys a VCF Instance.
# ----------------------------------------------------------------------------------- #

- name: Deploy VCF Instance
  broadcom.vcf.vcf_installer_instance:
    vcf_installer_hostname: "{{ all_iac_vars.vcf_installer.hostname }}"
    vcf_installer_user: "{{ all_iac_vars.vcf_installer.username | default('admin@local') }}"
    vcf_installer_password: "{{ vcf_installer_password | default(all_iac_vars.vcf_installer.password) }}"
    sddc_management_domain_payload: "{{ api_payload_json }}"
    validate_only: "{{ validate_only | default(false) }}"
  register: instance_result

- name: Show Validation Warnings
  broadcom.vcf.redact_debug:
    msg: "Validation warnings: {{ instance_result.validation_warnings }}"
  when:
    - instance_result.validation_warnings is defined
    - instance_result.validation_warnings | length > 0

- name: Show Success Message
  ansible.builtin.debug:
    msg: "{{ instance_result.msg }}"
  when: instance_result.msg is defined
