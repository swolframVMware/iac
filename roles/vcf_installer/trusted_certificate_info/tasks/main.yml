# ----------------------------------------------------------------------------------- #
# Role: vcf_installer.trusted_certificate_info
# ----------------------------------------------------------------------------------- #
# Description:
#   This role is responsible for retrieving trusted certificates information from the
#   VCF Installer trust store.
# ----------------------------------------------------------------------------------- #
# Variables:
#   Optional:
#   - trusted_certificate : A PEM certificate string to search for in the trust store.
# ----------------------------------------------------------------------------------- #

- name: Get Trusted Certificates Information
  broadcom.vcf.vcf_installer_trusted_certificate_info:
    vcf_installer_hostname: "{{ all_iac_vars.vcf_installer.hostname }}"
    vcf_installer_user: "{{ all_iac_vars.vcf_installer.username | default('admin@local') }}"
    vcf_installer_password: "{{ vcf_installer_password | default(all_iac_vars.vcf_installer.password) }}"
    certificate: "{{ trusted_certificate | default(omit) }}"
  register: trusted_certificate_info

- name: Display Status Message
  ansible.builtin.debug:
    msg: "{{ trusted_certificate_info.msg }}"
  when: trusted_certificate_info.msg is defined
