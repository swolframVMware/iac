# ----------------------------------------------------------------------------------- #
# Role: vcf_installer.ceip
# ----------------------------------------------------------------------------------- #
# Description:
#   This role is responsible for managing CEIP status in a VCF Installer instance.
# ----------------------------------------------------------------------------------- #

- name: Manage CEIP Status
  broadcom.vcf.vcf_installer_ceip:
    vcf_installer_hostname: "{{ all_iac_vars.vcf_installer.hostname }}"
    vcf_installer_user: "{{ all_iac_vars.vcf_installer.username | default('admin@local') }}"
    vcf_installer_password: "{{ vcf_installer_password | default(all_iac_vars.vcf_installer.password) }}"
    state: "{{ ceip_state }}"
  register: ceip_result

- name: Display CEIP Status Message
  ansible.builtin.debug:
    msg: "{{ ceip_result.msg }}"

- name: Wait for CEIP Update
  ansible.builtin.pause:
    seconds: 5
  when:
    - not ansible_check_mode
    - ceip_result.changed

- name: Verify CEIP Status
  broadcom.vcf.vcf_installer_ceip_info:
    vcf_installer_hostname: "{{ all_iac_vars.vcf_installer.hostname }}"
    vcf_installer_user: "{{ all_iac_vars.vcf_installer.username | default('admin@local') }}"
    vcf_installer_password: "{{ vcf_installer_password | default(all_iac_vars.vcf_installer.password) }}"
  register: ceip_verify_result
  when:
    - not ansible_check_mode
    - ceip_result.changed

- name: Display CEIP Result
  ansible.builtin.debug:
    msg: "{{ ceip_verify_result.msg }}"
  when:
    - not ansible_check_mode
    - ceip_result.changed
    - ceip_verify_result is defined
