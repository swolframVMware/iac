# ----------------------------------------------------------------------------------- #
# Role: precheck.esx_certificate
# ----------------------------------------------------------------------------------- #
# Description:
#   This role performs verification of SSL certificates on ESX hosts to ensure
#   they are valid and properly configured before host operations in a VMware Cloud
#   Foundation instance.
# ----------------------------------------------------------------------------------- #

- name: Check ESX Host SSL Certificate
  broadcom.vcf.precheck_esx_certificate:
    esx_hosts: "{{ esx_host_list }}"
    esx_host_user: "{{ esx_host_user | default('root') }}"
    esx_host_password: "{{ esx_host_password | default(all_iac_vars.vsphere.esx_root_password) }}"
    validate_certs: "{{ all_iac_vars.precheck.validate_certs }}"
  register: esx_certificate

- broadcom.vcf.redact_debug:
    var: esx_certificate
