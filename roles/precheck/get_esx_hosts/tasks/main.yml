# ----------------------------------------------------------------------------------- #
# Role: precheck.esx_hosts
# ----------------------------------------------------------------------------------- #
# Description:
#   This role prepares a list of ESX hosts from the provided infrastructure variables
#   to be used in various precheck operations before host operations in a VMware Cloud
#   Foundation instance.
# ----------------------------------------------------------------------------------- #

- name: Prepare ESX Hosts List
  ansible.builtin.set_fact:
    esx_host_list: []

- name: Collect ESX Hosts from Clusters
  ansible.builtin.set_fact:
    esx_host_list: "{{ all_iac_vars.vsphere.datacenter.clusters | selectattr('esx_hosts', 'defined') | map(attribute='esx_hosts') | sum(start=[]) }}"

- name: Display ESX Hosts List
  broadcom.vcf.redact_debug:
    msg: "{{ esx_host_list | map(attribute='hostname') }}" # Only lists out hostnames