# ----------------------------------------------------------------------------------- #
# Role: precheck.esx_precheck
# ----------------------------------------------------------------------------------- #
# Description:
#   This role checks the pre-requisites for ESX hosts before they are used in a
#   VMware Cloud Foundation deployment.
#
# Variables:
#   init (bool, default: false)
#     Set to true when running prechecks for an new VCF Instance deployment.
# ----------------------------------------------------------------------------------- #

# New VCF Instance
- name: Run New VCF Instance ESX Precheck
  ansible.builtin.include_tasks:
    file: new_instance.yml
  when: init | default(false) | bool

# Existing VCF Instance
- name: Run Existing VCF Instance ESX Precheck
  ansible.builtin.include_tasks:
    file: existing_instance.yml
  when: not (init | default(false) | bool)
