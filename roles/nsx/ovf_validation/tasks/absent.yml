---
- name: "Copy Disable OVF Validation Script to /tmp on {{ item.hostname }}"
  ansible.builtin.copy:
    src: "disable_ovf_validation_flag.sh"
    dest: "/tmp/disable_ovf_validation_flag.sh"
    mode: '0755'  # Makes the script executable
  delegate_to: "{{ item.hostname }}"

- name: "Disable OVF Validation on {{ item.hostname }}"
  ansible.builtin.shell: "bash /tmp/disable_ovf_validation_flag.sh"
  delegate_to: "{{ item.hostname }}"
  register: ovf_validation_result
  failed_when: "'FAILURE' in ovf_validation_result.stdout or 'ERROR' in ovf_validation_result.stdout"

- name: "OVF Validation disabled on {{ item.hostname }}"
  ansible.builtin.debug:
    msg: "Successfully disabled OVF Validation on {{ item.hostname }}"
  when: "'already set' in ovf_validation_result.stdout or 'SUCCESS' in ovf_validation_result.stdout"
