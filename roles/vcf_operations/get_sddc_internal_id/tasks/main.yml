# ----------------------------------------------------------------------------------- #
# Role: vcf_operations.get_sddc_internal_id
# ----------------------------------------------------------------------------------- #
# Description:
#   This role is responsible for retrieving the internal ID of the SDDC from
#   VMware Cloud Foundation Operations.
# ----------------------------------------------------------------------------------- #

- name: Get SDDC Internal ID
  broadcom.vcf.vcf_operations_internal_adapter:
    vcf_operations_hostname: "{{ all_iac_vars.operations.nodes[0].hostname }}"
    vcf_operations_user: "{{ all_iac_vars.operations.admin_username | default('admin') }}"
    vcf_operations_password: "{{ operations_admin_password | default(all_iac_vars.operations.admin_password) }}"
    sddc_hostname: "{{ all_iac_vars.sddc_manager.hostname }}"
  register: sddc_interal_id

- name: Set SDDC Internal ID
  ansible.builtin.set_fact:
    sddc_interal_id: "{{ sddc_interal_id.meta }}"

- name: Return SDDC Internal ID
  ansible.builtin.debug:
    msg: "SDDC Internal ID: {{ sddc_interal_id }}"
