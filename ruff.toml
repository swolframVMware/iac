# Ruff configuration.
target-version = "py312"
line-length = 88

[lint]
# Enable these rule sets.
# Commented out by default during code transition.
select = [
   # "E",     # pycodestyle errors
   # "W",     # pycodestyle warnings
   # "F",     # pyflakes
   # "I",     # isort
   # "N",     # pep8-naming
   # "UP",    # pyupgrade
   # "B",     # flake8-bugbear
   # "C4",    # flake8-comprehensions
   # "SIM",   # flake8-simplify
   # "RUF",   # Ruff-specific rules
]

# Ignore specific rules, if needed/desired.
ignore = [
    "E501",  # Line too long
]

# Exclude directories.
exclude = [
    ".venv",
    ".git",
    "__pycache__",
    "*.egg-info",
]

[format]
# Use double quotes for strings.
quote-style = "double"

# Indent with 4 spaces.
indent-style = "space"
