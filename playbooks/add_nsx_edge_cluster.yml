# ----------------------------------------------------------------------------------- #
# Playbook: Add NSX Edge Cluster
# ----------------------------------------------------------------------------------- #
# Description:
#   This playbook performs the creation of an NSX Edge Cluster in a VMware Cloud
#   Foundation instance's workload domain.
#
# Variables:
#   All variables can be provided using command-line inputs or a vars file:
#
#   - region     : Region identifier (e.g., 'amer', 'emea', 'apac')
#   - datacenter : Datacenter identifier (e.g., 'dc01', 'dc02')
#   - az         : Availability zone identifier (e.g., 'az01', 'az02')
#   - vcf        : VCF instance identifier (e.g., 'lab', 'prod')
#   - domain     : VCF workload domain identifier (e.g., 'w01')
#
# Usage Examples:
#   # Using a vars file:
#   ansible-playbook playbooks/add_nsx_edge_cluster.yml \
#     -e @examples/lab/vars/wld_automation_settings.yml
#
#   # Using inline variables:
#   ansible-playbook playbooks/add_nsx_edge_cluster.yml \
#     -e "region=amer datacenter=dc01 az=az01 vcf=lab domain=w01"
#
# ----------------------------------------------------------------------------------- #

- name: Add NSX Edge Cluster
  hosts: localhost
  gather_facts: true
  environment:
    no_proxy: "*"

  tasks:
    - name: Get IaC Settings
      ansible.builtin.include_role:
        name: broadcom.vcf.iac.get_settings

    - name: Pre-configure NSX Managers (9.0.x.x) for Edge Cluster Deployment
      when: all_iac_vars.instance.version is version('9.1.0.0', '<')
      block:
        - name: Start SSH Service on NSX Manager Nodes
          ansible.builtin.include_role:
            name: broadcom.vcf.nsx.ssh_service
          vars:
            ssh_service_state: present
            nsx_managers: "{{ all_iac_vars.nsx.deployment.nodes }}"

        - name: Disable OVF Validation on NSX Manager Nodes
          ansible.builtin.include_role:
            name: broadcom.vcf.nsx.ovf_validation
          vars:
            ansible_ssh_user: "root"
            ansible_ssh_pass: "{{ nsx_root_password }}"
            ansible_host_key_checking: false
            ovf_validation_state: absent
            nsx_managers: "{{ all_iac_vars.nsx.deployment.nodes }}"

    - name: Add NSX Edge Cluster
      ansible.builtin.include_role:
        name: broadcom.vcf.sddc_manager.nsx_edge_cluster

    - name: Post-configure NSX Manager (9.0.x.x) Nodes After Edge Cluster Deployment
      when: all_iac_vars.instance.version is version('9.1.0.0', '<')
      block:
        - name: Enable OVF Validation on NSX Manager Nodes
          ansible.builtin.include_role:
            name: broadcom.vcf.nsx.ovf_validation
          vars:
            ansible_ssh_user: "root"
            ansible_ssh_pass: "{{ nsx_root_password }}"
            ansible_host_key_checking: false
            ovf_validation_state: present
            nsx_managers: "{{ all_iac_vars.nsx.deployment.nodes }}"

        - name: Stop SSH Service on NSX Manager Nodes
          ansible.builtin.include_role:
            name: broadcom.vcf.nsx.ssh_service
          vars:
            ssh_service_state: absent
            nsx_managers: "{{ all_iac_vars.nsx.deployment.nodes }}"
