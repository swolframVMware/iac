# ----------------------------------------------------------------------------------- #
# Playbook: Remove Hosts from Cluster (Scale In)
# ----------------------------------------------------------------------------------- #
# Description:
#   This playbook removes ESX hosts from an existing cluster in a VMware Cloud
#   Foundation instance.
#
# Variables:
#   - cluster_input       : Name of the cluster to remove hosts from
#   - hosts_input         : List of host FQDNs to remove
#   - force_host_removal  : (Optional) Set to true to bypass minimum host check
#   - minimum_cluster_hosts : (Optional) Minimum hosts required (default: 3)
#
# Usage:
#   ansible-playbook playbooks/remove_cluster_hosts.yml \
#     -e @examples/lab/vars/wld_automation_settings.yml
#
#   ansible-playbook playbooks/remove_cluster_hosts.yml \
#     -e "cluster_input=cluster-01" \
#     -e "hosts_input=['esx-05.example.com']"
#
#   # Force removal even if below minimum:
#   ansible-playbook playbooks/remove_cluster_hosts.yml \
#     -e "cluster_input=cluster-01" \
#     -e "hosts_input=['esx-04.example.com','esx-05.example.com']" \
#     -e "force_host_removal=true"
# ----------------------------------------------------------------------------------- #

- name: Remove Hosts from Cluster
  hosts: localhost
  gather_facts: true
  environment:
    no_proxy: "*"

  tasks:
    - name: Get IaC Settings
      ansible.builtin.include_role:
        name: broadcom.vcf.iac.get_settings

    - name: Remove Hosts from Cluster
      ansible.builtin.include_role:
        name: broadcom.vcf.sddc_manager.cluster_hosts
      vars:
        cluster_hosts_state: absent