# ----------------------------------------------------------------------------------- #
# Playbook: Remove VCF Installer Appliance
# ----------------------------------------------------------------------------------- #
# Description:
#   This playbook removes the VCF Installer appliance from the vSphere environment.
#   It uses the IaC directory structure to identify the appliance to remove.
#
# Prerequisites:
#   - IaC configuration files must contain the appliance name/hostname
#   - vCenter credentials must be valid and have sufficient permissions
#
# Variables:
#   Required for IaC Configuration Loading:
#   - region     : Region identifier (e.g., 'amer', 'emea', 'apac')
#   - datacenter : Datacenter identifier (e.g., 'dc1', 'dc2')
#   - az         : Availability zone identifier (e.g., 'az1', 'az2')
#   - vcf        : VCF instance identifier (e.g., 'lab-arkham', 'lab-gcp')

#
# Usage Examples:
#   # Using a vars file:
#   ansible-playbook playbooks/remove_installer_appliance.yml \
#     -e @examples/lab-arkham/vars/installer_automation_settings.yml \
#     --ask-vault-pass
#
#   # Using inline variables:
#   ansible-playbook playbooks/remove_installer_appliance.yml \
#     -e "region=amer datacenter=dc1 az=az1 vcf=lab-arkham"
#
#   # Check mode (dry-run):
#   ansible-playbook playbooks/remove_installer_appliance.yml \
#     -e @examples/lab-arkham/vars/installer_automation_settings.yml \
#     --check
# ----------------------------------------------------------------------------------- #

- name: Remove VCF Installer Appliance
  hosts: localhost
  gather_facts: true
  environment:
    no_proxy: "*"

  tasks:
    - name: Get IaC Settings
      ansible.builtin.include_role:
        name: broadcom.vcf.iac.get_settings

    - name: Remove VCF Installer Appliance
      ansible.builtin.include_role:
        name: broadcom.vcf.vcf_installer.appliance
      vars:
        appliance_state: absent
        appliance_force_remove: true
