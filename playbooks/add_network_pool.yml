# ----------------------------------------------------------------------------------- #
# Playbook: Add Network Pool
# ----------------------------------------------------------------------------------- #
# Description:
#   This playbook performs the addition of network pool(s) in a VMware Cloud
#   Foundation instance.
#
# Variables:
#   All variables can be provided using command-line inputs or a vars file:
#
#   - region     : Region identifier (e.g., 'amer', 'emea', 'apac')
#   - datacenter : Datacenter identifier (e.g., 'dc01', 'dc02')
#   - az         : Availability zone identifier (e.g., 'az01', 'az02')
#   - vcf        : VCF instance identifier (e.g., 'lab', 'prod')
#
# Usage Examples:
#   # Using a vars file:
#   ansible-playbook playbooks/add_network_pool.yml \
#     -e @examples/lab/vars/iac_settings.yml
#
#   # Using inline variables:
#   ansible-playbook playbooks/add_network_pool.yml \
#     -e "region=amer datacenter=dc01 az=az01 vcf=lab"
#
# ----------------------------------------------------------------------------------- #

- name: Add Network Pool
  hosts: localhost
  gather_facts: true
  environment:
    no_proxy: "*"

  tasks:
    - name: Get IaC Settings
      ansible.builtin.include_role:
        name: broadcom.vcf.iac.get_settings

    - name: Add Network Pool
      ansible.builtin.include_role:
        name: broadcom.vcf.sddc_manager.network_pool
      vars:
        network_pool_state: present