# ----------------------------------------------------------------------------------- #
# Playbook: Add Hosts to Cluster (Scale Out)
# ----------------------------------------------------------------------------------- #
# Description:
#   This playbook adds ESX hosts to an existing cluster in a VMware Cloud Foundation
#   instance.
#
# Variables:
#   - cluster_input : Name of the cluster to add hosts to
#   - hosts_input   : List of host FQDNs to add
#
# Usage:
#   ansible-playbook playbooks/add_cluster_hosts.yml \
#     -e @examples/lab/vars/wld_automation_settings.yml
#
#   ansible-playbook playbooks/add_cluster_hosts.yml \
#     -e "cluster_input=cluster-01" \
#     -e "hosts_input=['esx-04.example.com','esx-05.example.com']"
# ----------------------------------------------------------------------------------- #

- name: Add Hosts to Cluster
  hosts: localhost
  gather_facts: true
  environment:
    no_proxy: "*"

  tasks:
    - name: Get IaC Settings
      ansible.builtin.include_role:
        name: broadcom.vcf.iac.get_settings

    - name: Add Hosts to Cluster
      ansible.builtin.include_role:
        name: broadcom.vcf.sddc_manager.cluster_hosts
      vars:
        cluster_hosts_state: present