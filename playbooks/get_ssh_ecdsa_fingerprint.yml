# ----------------------------------------------------------------------------------- #
# Playbook: Get SSH ECDSA Fingerprint
# ----------------------------------------------------------------------------------- #
# Description:
#   This playbook retrieves the SSH ECDSA fingerprint from an endpoint.
#
# Variables:
#   target_host: (Required) The hostname or IP address of the target endpoint.
#
# Usage Examples:
#   ansible-playbook playbooks/get_ssh_fingerprint.yml -e "target_host=backup.example.com"
#
# ----------------------------------------------------------------------------------- #

- name: Get SSH ECDSA Fingerprint
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Get SSH ECDSA Fingerprint
      ansible.builtin.include_role:
        name: broadcom.vcf.util.ssh_ecdsa_fingerprint

    - name: Display Fingerprint Results
      ansible.builtin.debug:
        msg: "{{ ssh_ecdsa_fingerprint }}"
