# ----------------------------------------------------------------------------------- #
# Playbook: Removes Installation Bundles from VCF Installer
# ----------------------------------------------------------------------------------- #
# Description:
#   This playbook removes the installation bundle status from a VCF Installer
#   instance for the releases and/or components.
#
# Variables:
#   All variables can be provided using command-line inputs or a vars file:
#
#   Required for IaC Configuration Loading:
#   - region     : Region identifier (e.g., 'amer', 'emea', 'apac')
#   - datacenter : Datacenter identifier (e.g., 'dc01', 'dc02')
#   - az         : Availability zone identifier (e.g., 'az01', 'az02')
#   - vcf        : VCF instance identifier (e.g., 'lab', 'prod')
#   - domain     : VCF domain identifier (e.g., 'm01', 'w01')
#
# Usage Examples:
#   ansible-playbook playbooks/remove_bundle_installers.yml \
#     -e @examples/lab/vars/mgmt_automation_settings.yml
#
#   ansible-playbook playbooks/remove_bundles_installer.yml \
#     -e "region=amer datacenter=dc01 az=az01 vcf=lab domain=m01"
#
# ----------------------------------------------------------------------------------- #

- name: Remove Bundles from VCF Installer
  hosts: localhost
  gather_facts: true
  environment:
    no_proxy: "*"

  vars:
    _done_statuses:
      - SUCCESSFUL
      - SUCCESS

    _component_api_map:
      avi-lb: NSX_ALB
      cloud-proxy: VCF_OPS_CLOUD_PROXY
      fleet-lcm: VCF_FLEET_LCM
      identity-broker: VIDB
      license-server: VCF_LICENSE_SERVER
      migration-services-engine: VCF_SERVICE_VCD_MIGRATION_BACKEND
      nsx: NSX_T_MANAGER
      salt-master: VCF_SALT
      salt-raas: VCF_SALT_RAAS
      sddc-lcm: VCF_SDDC_LCM
      sddc-manager: SDDC_MANAGER
      software-depot: DEPOT_SERVICE
      telemetry: TELEMETRY_ACCEPTOR
      vcenter: VCENTER
      vcf-automation: VRA
      vcf-operations: VROPS
      vcf-operations-fleet: VRSLCM
      vcf-operations-hcx: HCX
      vcf-service-runtime: VSP

    _component_name_map:
      DEPOT_SERVICE: Software Depot
      HCX: VCF Operations HCX
      NSX_ALB: Avi Load Balancer
      NSX_T_MANAGER: NSX
      SDDC_MANAGER: SDDC Manager
      TELEMETRY_ACCEPTOR: Telemetry
      VCENTER: vCenter
      VCF_FLEET_LCM: Fleet Lifecycle
      VCF_LICENSE_SERVER: License Server
      VCF_OPS_CLOUD_PROXY: Cloud Proxy
      VCF_SALT: Salt Master
      VCF_SALT_RAAS: Salt RaaS
      VCF_SDDC_LCM: SDDC Lifecycle
      VCF_SERVICE_VCD_MIGRATION_BACKEND: Migration Service Engine
      VIDB: Identity Broker
      VRA: VCF Automation
      VROPS: VCF Operations
      VRSLCM: VCF Operations Fleet Management
      VSP: VCF Services Runtime

  tasks:
    - name: Get IaC Settings
      ansible.builtin.include_role:
        name: broadcom.vcf.iac.get_settings

    - name: Validate Bundle Configuration
      ansible.builtin.assert:
        that:
          - all_iac_vars.bundle is defined
          - all_iac_vars.bundle.releases is defined
          - all_iac_vars.bundle.releases | length > 0
        fail_msg: "bundle.yml must define at least one release under bundle.releases"

    - name: Get Bundle Download Status per Release
      broadcom.vcf.vcf_installer_bundle_info:
        vcf_installer_hostname: "{{ all_iac_vars.vcf_installer.hostname }}"
        vcf_installer_user: "{{ all_iac_vars.vcf_installer.username | default('admin@local') }}"
        vcf_installer_password: "{{ vcf_installer_password | default(all_iac_vars.vcf_installer.password) }}"
        operation: download_status
        release_version: "{{ item.release_version }}"
      loop: "{{ all_iac_vars.bundle.releases }}"
      loop_control:
        label: "release={{ item.release_version }}"
      register: release_status_results

    - name: Initialize Bundle Status Elements
      ansible.builtin.set_fact:
        _release_filtered: []

    - name: Set Filtered Elements per Release
      ansible.builtin.set_fact:
        _release_filtered: >-
          {{ _release_filtered | default([]) +
             ( ( item.download_status.elements | default([]) )
               if (item.item.download_all | default(true)) | bool
               else
               ( item.download_status.elements | default([])
                 | selectattr('componentType', 'in',
                     item.item.components | default([])
                     | map('extract', _component_api_map)
                     | select('defined')
                     | list)
                 | list )
             ) }}
      loop: "{{ release_status_results.results }}"
      loop_control:
        label: "release={{ item.item.release_version }}"

    - name: Build Remove List
      ansible.builtin.set_fact:
        _bundles_to_remove: "{{ _release_filtered | selectattr('downloadStatus', 'in', _done_statuses) | list }}"

    - name: Display Planned Actions
      ansible.builtin.debug:
        msg: |
          Planned Actions:
          - Remove (downloaded bundles): {{ _bundles_to_remove | length }}
          - Skip (not downloaded): {{ _release_filtered | length - _bundles_to_remove | length }}

    - name: Warn for Full Bundle Record Deletion
      ansible.builtin.debug:
        msg: "binary_files_only=false selected. This can remove bundle records and may hide download status/history until metadata is refreshed."
      when: not (binary_files_only | default(true) | bool)

    - name: No Downloaded Bundles to Remove
      ansible.builtin.debug:
        msg: "No downloaded bundles to delete."
      when: _bundles_to_remove | length == 0

    - name: Remove Downloaded Bundles
      broadcom.vcf.vcf_installer_bundle:
        vcf_installer_hostname: "{{ all_iac_vars.vcf_installer.hostname }}"
        vcf_installer_user: "{{ all_iac_vars.vcf_installer.username | default('admin@local') }}"
        vcf_installer_password: "{{ vcf_installer_password | default(all_iac_vars.vcf_installer.password) }}"
        state: absent
        bundle_id: "{{ item.bundleId }}"
        binary_files_only: "{{ binary_files_only | default(true) }}"
      loop: "{{ _bundles_to_remove }}"
      loop_control:
        label: "{{ _component_name_map[item.componentType] | default(item.componentType | lower) }} {{ item.version | default('unknown') }}"
      register: delete_results
      when: _bundles_to_remove | length > 0

    - name: Display Remove Results
      ansible.builtin.debug:
        msg: "{{ _component_name_map[item.item.componentType] | default(item.item.componentType | lower) }} {{ item.item.version | default('unknown') }}: {{ item.msg }}"
      loop: "{{ delete_results.results | default([]) }}"
      loop_control:
        label: "{{ _component_name_map[item.item.componentType] | default(item.item.componentType | lower) }} {{ item.item.version | default('unknown') }}"
      when: _bundles_to_remove | length > 0

    - name: Display Remove Summary
      ansible.builtin.debug:
        msg: "Bundle removal summary: removed={{ delete_results.results | default([]) | selectattr('changed', 'equalto', true) | list | length }}, skipped={{ (delete_results.results | default([]) | rejectattr('changed', 'equalto', true) | list | length) + (_release_filtered | rejectattr('downloadStatus', 'in', _done_statuses) | list | length) }}"
